name: CI

on:
  push:
    branches: [main, feat/**]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout ai-ui-kit (sibling)
        uses: actions/checkout@v4
        with:
          repository: open-strata-ai/ai-ui-kit
          path: ../ai-ui-kit
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build --if-present
      - run: npm test --if-present
