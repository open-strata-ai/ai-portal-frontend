name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, feat/**]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout ai-ui-kit source
        uses: actions/checkout@v4
        with:
          repository: open-strata-ai/ai-ui-kit
          path: ai-ui-kit-src
      - name: Link ai-ui-kit as sibling (vite alias expects ../ai-ui-kit)
        run: ln -s "$GITHUB_WORKSPACE/ai-ui-kit-src" "$GITHUB_WORKSPACE/../ai-ui-kit"
      - name: Install ai-ui-kit dependencies (required to type-check its source)
        working-directory: ai-ui-kit-src
        run: npm install
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build --if-present
      - run: npm test --if-present
